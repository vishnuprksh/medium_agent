databases:
  - name: medium-ai-reader-db
    databaseName: digest_history
    user: digest_user

services:
  - type: cron
    name: medium-ai-reader-digest
    runtime: python
    schedule: "0 13 * * *"
    buildCommand: "pip install -r requirements.txt"
    startCommand: "python app.py"
    envVars:
      - key: DIGEST_RECIPIENTS
        value: vishnucheppanam@gmail.com
      - key: DIGEST_INTENT
        value: Practical, non-hype articles about building useful AI agents with Python and product thinking.
      - key: DIGEST_TAGS
        value: artificial-intelligence, ai-agents, python, software-development
      - key: DIGEST_SOURCES
        value: ""
      - key: DIGEST_MAX_FEEDS
        value: "10"
      - key: DIGEST_MAX_ITEMS_PER_FEED
        value: "20"
      - key: DIGEST_TOP_K
        value: "8"
      - key: DIGEST_USE_OPENROUTER
        value: "true"
      - key: DIGEST_INCLUDE_METRICS
        value: "false"
      - key: DIGEST_REQUIRE_DELIVERY_HISTORY
        value: "true"
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_USERNAME
        sync: false
      - key: SMTP_PASSWORD
        sync: false
      - key: SMTP_FROM
        sync: false
      - key: SMTP_USE_TLS
        value: "true"
      - key: OPENROUTER_API_KEY
        sync: false
      - key: APP_USER_AGENT
        value: MediumAIReader/0.1 (+mailto:vishnucheppanam@gmail.com; respectful RSS discovery)
      - key: DIGEST_DB_DSN
        fromDatabase:
          name: medium-ai-reader-db
          property: connectionString
